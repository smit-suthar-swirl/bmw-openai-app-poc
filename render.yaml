services:
  - type: web
    name: bmw-openai-app-poc
    runtime: node
    buildCommand: npm install
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: MCP_SERVER_NAME
        value: bmw-ai-mcp
      - key: MCP_SERVER_VERSION
        value: "3.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: bmw-ai-db
          property: connectionString

databases:
  - name: bmw-ai-db
    plan: free
    databaseName: bmw_ai
    user: bmw_ai_user
